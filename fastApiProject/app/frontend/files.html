<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="utf-8">
    <title>Ops Platform</title>
</head>

<body>
<a href="/">点击跳转到首页</a><br>
<a href="/tasks">点击跳转到tasks</a><br>
<a href="/commands">点击跳转到tasks</a><br>
<a href="/stress">点击跳转到stress</a><br>
<h2>文件上传</h2>

<input type="file" id="fileInput">
<button onclick="uploadFile()">上传</button>

<hr>

<h2>文件列表</h2>

<button onclick="loadFiles()">显示文件列表</button>

<ul id="fileList"></ul>
<hr>
<h2>翻译工具</h2>
    <label for="text">请输入内容：</label><br>
    <textarea id="text" rows="3" cols="60"></textarea><br>
    <label for="target_lang">请选择目标语言：</label>
    <select id="target_lang">
        <option value="zh-cn">中文</option>
        <option value="en">英文</option>
    </select><br>
<button type="button" onclick="translateText()" style="font-size:20px; padding:10px 20px;">翻译</button>
<h3>翻译结果：</h3>
<p id="translated_text"></p>


<script>

const API = ""

async function uploadFile() {
    const fileInput = document.getElementById("fileInput")
    const file = fileInput.files[0]

    if (!file) {
        alert("请选择文件")
        return
    }

    const formData = new FormData()
    formData.append("file", file)

    const res = await fetch(API + "/files/upload", {
        method: "POST",
        body: formData
    })

    const data = await res.json()

    console.log("status:", res.status)
    console.log("data:", data)

    alert(JSON.stringify(data))

    loadFiles()
}


async function loadFiles() {
    const res = await fetch(API + "/files/list")
    const data = await res.json()
    const list = document.getElementById("fileList")
    list.innerHTML = ""
    data.files.forEach(file => {
        const li = document.createElement("li")
        li.innerHTML =
            file.filename +
            " (" + file.size + " bytes) " +
            `<button onclick="downloadFile('${file.filename}')">下载</button>` +
            `<button onclick="deleteFile('${file.filename}')">删除</button>`
        list.appendChild(li)
    })
}


function downloadFile(name) {
    window.open(API + "/files/download/" + name)
}


async function deleteFile(name) {

    await fetch(API + "/files/delete/" + name, {
        method: "DELETE"
    })

    loadFiles()
}

async function translateText() {
    const text = document.getElementById("text").value;
    const targetLang = document.getElementById("target_lang").value;

    const formData = new FormData();
    formData.append("text", text);
    formData.append("target_lang", targetLang);

    const res = await fetch("/translate", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    console.log(data);
    document.getElementById("translated_text").innerText = data.translated_text;
}

</script>

</body>
</html>
