<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>任务调度页面</title>
</head>
<body>
<a href="/files">点击跳转到files</a><br>
<a href="/">点击跳转到首页</a><br>
<a href="/commands">点击跳转到tasks</a><br>
<a href="/stress">点击跳转到stress</a><br>
<h1>任务调度管理</h1>

<h2>创建任务</h2>
<div>
    <label>任务名称：</label><br>
    <input type="text" id="task_name" value="test01">
</div>

<br>

<div>
    <label>执行命令：</label><br>
    <input type="text" id="command" value="ls">
</div>

<br>

<div>
        <label>调度类型：</label>
    <select id="scheduleType" onchange="updateCron()">
    <option value="now">立即执行</option>
    <option value="every_minute">每分钟</option>
    <option value="every_hour">每小时</option>
    <option value="every_day">每天</option>
    <option value="every_week">每周</option>
</select>
    <br><br>
    <div id="minuteBox">
        <label>分钟：</label>
        <input type="number" id="minute" min="0" max="59" value="0" onchange="updateCron()">
        <br><br>
    </div>

    <div id="hourBox" style="display:none;">
        <label>小时：</label>
        <input type="number" id="hour" min="0" max="23" value="0" onchange="updateCron()">
        <br><br>
    </div>

    <div id="weekBox" style="display:none;">
        <label>星期：</label>
        <select id="weekday" onchange="updateCron()">
            <option value="0">周日</option>
            <option value="1">周一</option>
            <option value="2">周二</option>
            <option value="3">周三</option>
            <option value="4">周四</option>
            <option value="5">周五</option>
            <option value="6">周六</option>
        </select>
        <br><br>
    </div>

    <label>生成的 Cron：</label>
    <input type="text" id="cron" readonly value="ls">
    <br><br>
</div>

<br>

<button type="button" onclick="createTask()">创建任务</button>

<hr>

<h2>任务列表</h2>
<button type="button" onclick="loadTasks()">刷新任务列表</button>

<p id="task_total"></p>

<ul id="task_list"></ul>

<hr>

<h2>接口返回结果</h2>
<pre id="result_box"></pre>

<script>
    async function createTask() {
    const taskName = document.getElementById("task_name").value;
    const command = document.getElementById("command").value;
    const cron = document.getElementById("cron").value;

    if (!taskName || !command || !cron) {
        alert("请把任务名称、命令、cron 表达式都填完整");
        return;
    }

    const res = await fetch("/task", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            task_name: taskName,
            command: command,
            cron: cron
        })
    });

    const data = await res.json();

    if (data.error) {
        alert("创建任务失败：" + data.error);
        document.getElementById("result_box").innerText = JSON.stringify(data, null, 2);
        return;
    }

    alert(data.message || "创建成功");
    document.getElementById("result_box").innerText = JSON.stringify(data, null, 2);

    loadTasks();
}

    async function loadTasks() {
        const res = await fetch("/task", {
            method: "GET"
        });

        const data = await res.json();

        document.getElementById("result_box").innerText = JSON.stringify(data, null, 2);
        document.getElementById("task_total").innerText = "任务总数：" + data.total;

        const taskList = document.getElementById("task_list");
        taskList.innerHTML = "";

        data.data.forEach(task => {
            const li = document.createElement("li");

            li.innerHTML =
                "任务ID：" + task.task_id +
                " | 任务名称：" + task.task_name +
                " | 命令：" + task.command +
                " | cron：" + task.cron +
                ' <button onclick="runTask(\'' + task.task_id + '\')">立即执行</button>' +
                ' <button onclick="deleteTask(\'' + task.task_id + '\')">删除</button>';

            taskList.appendChild(li);
        });
    }

    async function deleteTask(taskId) {
        const res = await fetch("/task/" + taskId, {
            method: "DELETE"
        });

        const data = await res.json();

        document.getElementById("result_box").innerText = JSON.stringify(data, null, 2);

        loadTasks();
    }

    async function runTask(taskId) {
        const res = await fetch("/task/" + taskId + "/run", {
            method: "POST"
        });

        const data = await res.json();

        document.getElementById("result_box").innerText = JSON.stringify(data, null, 2);
    }

    loadTasks();

    function updateCron() {
    const type = document.getElementById("scheduleType").value;
    const minute = document.getElementById("minute").value || 0;
    const hour = document.getElementById("hour").value || 0;
    const weekday = document.getElementById("weekday").value || 0;

    document.getElementById("hourBox").style.display = "none";
    document.getElementById("weekBox").style.display = "none";
    document.getElementById("minuteBox").style.display = "none";

    let cron = "";

    if (type === "now") {
        cron = "now";
    } else if (type === "every_minute") {
        cron = "* * * * *";
    } else if (type === "every_hour") {
        document.getElementById("minuteBox").style.display = "block";
        cron = `${minute} * * * *`;
    } else if (type === "every_day") {
        document.getElementById("minuteBox").style.display = "block";
        document.getElementById("hourBox").style.display = "block";
        cron = `${minute} ${hour} * * *`;
    } else if (type === "every_week") {
        document.getElementById("minuteBox").style.display = "block";
        document.getElementById("hourBox").style.display = "block";
        document.getElementById("weekBox").style.display = "block";
        cron = `${minute} ${hour} * * ${weekday}`;
    }

    document.getElementById("cron").value = cron;
}

        updateCron();

</script>

</body>
</html>
